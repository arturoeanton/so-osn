# osnos minimal lighttpd config — static file serving only.
server.document-root        = "/home"
server.upload-dirs          = ( "/home" )
server.port                 = 80
server.bind                 = "0.0.0.0"
server.username             = ""
server.groupname            = ""
server.errorlog             = "/home/lighttpd.log"
server.pid-file             = "/home/lighttpd.pid"
server.tag                  = "lighttpd/1.4.76-osnos"

# Built-in modules cargados estáticamente.
server.modules              = (
    "mod_indexfile",
    "mod_staticfile",
)

index-file.names            = ( "index.html" )

# MIME types mínimos.
mimetype.assign             = (
    ".html" => "text/html",
    ".txt"  => "text/plain",
    ".css"  => "text/css",
    ".js"   => "application/javascript",
    ".json" => "application/json",
    ".png"  => "image/png",
    ".jpg"  => "image/jpeg",
    ""      => "application/octet-stream"
)
